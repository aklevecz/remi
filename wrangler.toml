[[d1_databases]]
binding = "DB"
database_name = "remi"
database_id = "5e771ab9-9356-4dde-a466-a4cdcb7d85db"
# Ensures `wrangler d1` and `astro dev` use the same local sqlite file, which
# includes a UUID based on the db name.
preview_database_id = "DB"

[[r2_buckets]]
binding = "R2"
bucket_name = "remi"

# Bind a KV Namespace. Use KV as persistent storage for small key-value pairs.
# Docs: https://developers.cloudflare.com/pages/functions/bindings/#kv-namespaces
[[kv_namespaces]]
binding = "KV"
id = "remi"